<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="bg-orb orb-4"></div>

  <div class="scene">
    <div class="calculator" id="calculator">

      <!-- Display -->
      <div class="display">
        <div class="display-expression" id="expression">&nbsp;</div>
        <div class="display-result" id="result">0</div>
      </div>

      <!-- Button Grid -->
      <div class="btn-grid">

        <!-- Row 1 -->
        <button class="btn btn-func" data-action="clear" title="Clear All">C</button>
        <button class="btn btn-func" data-action="sign" title="Toggle Sign">+/−</button>
        <button class="btn btn-func" data-action="percent" title="Percent">%</button>
        <button class="btn btn-operator" data-action="operator" data-value="÷" title="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="number" data-value="7">7</button>
        <button class="btn btn-num" data-action="number" data-value="8">8</button>
        <button class="btn btn-num" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator" data-action="operator" data-value="×" title="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="number" data-value="4">4</button>
        <button class="btn btn-num" data-action="number" data-value="5">5</button>
        <button class="btn btn-num" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator" data-action="operator" data-value="−" title="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="number" data-value="1">1</button>
        <button class="btn btn-num" data-action="number" data-value="2">2</button>
        <button class="btn btn-num" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator" data-action="operator" data-value="+" title="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num btn-zero" data-action="number" data-value="0">0</button>
        <button class="btn btn-num" data-action="decimal" title="Decimal">.</button>
        <button class="btn btn-func btn-delete" data-action="delete" title="Backspace">⌫</button>
        <button class="btn btn-equals" data-action="equals" title="Equals">=</button>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
